<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMA Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --surface3: #222222;
    --border: #2a2a2a;
    --border2: #333333;
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --red: #cc2936;
    --red2: #e63946;
    --text: #f0f0f0;
    --text2: #aaaaaa;
    --text3: #666666;
    --correct: #1a5c2a;
    --correct-border: #2d9e47;
    --correct-text: #5ddb7a;
    --wrong: #3d0f0f;
    --cell-size: 120px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Fight poster grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* Red diagonal slash accent */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    right: -10%;
    width: 3px;
    height: 140%;
    background: linear-gradient(180deg, transparent, var(--red) 30%, var(--red) 70%, transparent);
    transform: rotate(-15deg);
    opacity: 0.15;
    pointer-events: none;
  }

  header {
    position: relative;
    padding: 1.5rem 2rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 0.05em;
    line-height: 1;
    color: var(--text);
  }

  .logo span {
    color: var(--red);
  }

  .header-right {
    text-align: right;
  }

  .date-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: var(--text3);
    text-transform: uppercase;
  }

  .puzzle-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  /* Attempts bar */
  .attempts-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 0.75rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .attempts-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    color: var(--text3);
    text-transform: uppercase;
  }

  .attempt-dots {
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--surface3);
    border: 1px solid var(--border2);
    transition: all 0.3s ease;
  }

  .dot.used {
    background: var(--red);
    border-color: var(--red2);
    box-shadow: 0 0 6px var(--red);
  }

  .dot.remaining {
    background: var(--gold);
    border-color: var(--gold2);
  }

  /* Main game area */
  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    gap: 0;
  }

  /* Grid layout */
  .grid-container {
    position: relative;
    display: grid;
    grid-template-columns: 100px repeat(3, var(--cell-size));
    grid-template-rows: 100px repeat(3, var(--cell-size));
    gap: 3px;
    background: var(--border);
  }

  .corner-cell {
    background: var(--bg);
    position: relative;
  }

  .corner-cell::after {
    content: 'MMA';
    position: absolute;
    bottom: 8px;
    right: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    color: var(--border2);
    letter-spacing: 0.1em;
  }

  .col-header {
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.5rem;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);
    line-height: 1.3;
    border-bottom: 2px solid var(--gold);
  }

  .row-header {
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.5rem;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);
    line-height: 1.3;
    border-right: 2px solid var(--gold);
  }

  /* Game cells */
  .cell {
    background: var(--surface);
    position: relative;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .cell:hover:not(.correct):not(.locked) {
    background: var(--surface3);
  }

  .cell.selected:not(.correct) {
    background: var(--surface3);
    outline: 2px solid var(--gold);
    outline-offset: -2px;
    z-index: 10;
  }

  .cell.correct {
    background: var(--correct);
    cursor: default;
  }

  .cell.correct .cell-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px;
    text-align: center;
  }

  .cell-fighter-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--correct-text);
    line-height: 1.2;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .cell-rarity {
    font-family: 'Barlow', sans-serif;
    font-size: 0.7rem;
    color: #5ddb7a;
    opacity: 0.7;
  }

  .cell-plus {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--border2);
    transition: color 0.15s;
    line-height: 1;
  }

  .cell:hover:not(.correct) .cell-plus {
    color: var(--gold);
  }

  .cell.selected .cell-plus {
    color: var(--gold);
  }

  /* Cell number badge */
  .cell-num {
    position: absolute;
    top: 5px;
    left: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    color: var(--text3);
    letter-spacing: 0.05em;
  }

  /* Wrong flash */
  @keyframes wrongFlash {
    0%, 100% { background: var(--surface); }
    50% { background: var(--wrong); }
  }

  .cell.wrong-flash {
    animation: wrongFlash 0.4s ease;
  }

  /* Input area */
  .input-area {
    margin-top: 1.5rem;
    width: calc(100px + 3 * var(--cell-size) + 9px);
    max-width: 100%;
    position: relative;
  }

  .input-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .selected-cell-indicator {
    color: var(--gold);
    font-weight: 700;
  }

  .input-row {
    display: flex;
    gap: 8px;
    position: relative;
  }

  #fighter-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.15s;
    text-transform: uppercase;
  }

  #fighter-input:focus {
    border-color: var(--gold);
  }

  #fighter-input::placeholder {
    color: var(--text3);
    text-transform: none;
    font-weight: 400;
  }

  #submit-btn {
    background: var(--red);
    color: var(--text);
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    padding: 0 1.5rem;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  #submit-btn:hover { background: var(--red2); }
  #submit-btn:active { transform: scale(0.97); }
  #submit-btn:disabled { background: var(--border2); cursor: not-allowed; }

  /* Autocomplete dropdown */
  .autocomplete-list {
    position: absolute;
    top: calc(100% + 2px);
    left: 0;
    right: 60px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-top: none;
    max-height: 200px;
    overflow-y: auto;
    z-index: 100;
    display: none;
  }

  .autocomplete-list.visible { display: block; }

  .autocomplete-item {
    padding: 0.6rem 1rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    color: var(--text2);
  }

  .autocomplete-item:hover,
  .autocomplete-item.highlighted {
    background: var(--surface3);
    color: var(--text);
  }

  .autocomplete-item strong {
    color: var(--gold);
    font-weight: 700;
  }

  /* Message toast */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.08em;
    padding: 0.6rem 1.5rem;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 999;
    text-transform: uppercase;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.success { border-color: var(--correct-border); color: var(--correct-text); }
  .toast.error { border-color: var(--red); color: var(--red2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 2rem;
    margin-top: 1.5rem;
    padding: 1rem 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    width: calc(100px + 3 * var(--cell-size) + 9px);
    max-width: 100%;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--gold);
    line-height: 1;
  }

  .stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--text3);
    text-transform: uppercase;
  }

  /* Game over overlay */
  .game-over {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 500;
    align-items: center;
    justify-content: center;
  }

  .game-over.show { display: flex; }

  .game-over-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-top: 3px solid var(--gold);
    padding: 2.5rem;
    max-width: 420px;
    width: 90%;
    text-align: center;
  }

  .game-over-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.1em;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .game-over-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .game-over-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    color: var(--text);
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .game-over-score span {
    color: var(--text3);
    font-size: 2rem;
  }

  .game-over-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .share-btn {
    background: var(--gold);
    color: var(--bg);
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.1em;
    padding: 0.75rem 2rem;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
    margin-bottom: 0.75rem;
  }

  .share-btn:hover { background: var(--gold2); }

  .next-puzzle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
  }

  #countdown { color: var(--gold); }

  /* Loading state */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 1rem;
  }

  .loading-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.2em;
    color: var(--text3);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* Correct cell animation */
  @keyframes correctPop {
    0% { transform: scale(0.9); opacity: 0; }
    60% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  .cell.correct .cell-inner {
    animation: correctPop 0.4s ease forwards;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border2); }

  /* Mobile */
  @media (max-width: 520px) {
    :root { --cell-size: 85px; }
    .logo { font-size: 2rem; }
    .col-header, .row-header { font-size: 0.65rem; }
    .cell-fighter-name { font-size: 0.72rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">MMA<span>GRID</span></div>
  <div class="header-right">
    <div class="date-label" id="date-label">Loading...</div>
    <div class="puzzle-num" id="puzzle-num">#—</div>
  </div>
</header>

<div class="attempts-bar">
  <span class="attempts-label">Attempts</span>
  <div class="attempt-dots" id="attempt-dots"></div>
  <span class="attempts-label" id="attempts-remaining">9 remaining</span>
</div>

<div class="game-wrapper" id="game-wrapper">
  <div class="loading">
    <div class="loading-text">Loading Puzzle</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="game-over" id="game-over">
  <div class="game-over-card">
    <div class="game-over-title" id="go-title">Fight Over</div>
    <div class="game-over-sub" id="go-sub">Today's MMA Grid Complete</div>
    <div class="game-over-score" id="go-score">0<span>/9</span></div>
    <div class="game-over-label">Cells Solved</div>
    <button class="share-btn" id="share-btn">Share Results</button>
    <div class="next-puzzle">Next puzzle in <span id="countdown">--:--:--</span></div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const PUZZLES_CSV = 'https://raw.githubusercontent.com/KDog13k/MMAGrid/main/mma_grid_puzzles.csv';
const FIGHTERS_CSV = 'https://raw.githubusercontent.com/KDog13k/MMAGrid/main/fighters.csv';
const SUPABASE_URL = 'https://qpxnhowbleckjcqlzwsa.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFweG5ob3dibGVja2pjcWx6d3NhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczOTYzMzQsImV4cCI6MjA5Mjk3MjMzNH0.TRbnaU9UCDRt9U7D9XoU1waB6kXmezSG0rR4DD70-6I';

// ── State ───────────────────────────────────────────────────────────────────
let puzzle = null;
let fighters = [];
let fighterNames = [];
let selectedCell = null;
let attemptsLeft = 9;
let attemptsUsed = 0;
let solvedCells = {};
let gameOver = false;
let autocompleteIndex = -1;

// ── Date helpers ────────────────────────────────────────────────────────────
function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

function getTimeUntilMidnight() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  const diff = midnight - now;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ── localStorage ────────────────────────────────────────────────────────────
function saveState() {
  const key = `mmag_${getTodayKey()}`;
  localStorage.setItem(key, JSON.stringify({
    solvedCells, attemptsUsed, attemptsLeft, gameOver
  }));
}

function loadState() {
  const key = `mmag_${getTodayKey()}`;
  const saved = localStorage.getItem(key);
  if (saved) {
    const s = JSON.parse(saved);
    solvedCells = s.solvedCells || {};
    attemptsUsed = s.attemptsUsed || 0;
    attemptsLeft = s.attemptsLeft !== undefined ? s.attemptsLeft : 9;
    gameOver = s.gameOver || false;
    return true;
  }
  return false;
}

// ── Data loading ─────────────────────────────────────────────────────────────
async function loadPuzzle() {
  return new Promise((resolve, reject) => {
    Papa.parse(PUZZLES_CSV, {
      download: true,
      header: true,
      complete: (results) => {
        const today = getTodayKey();
        const row = results.data.find(r => r.date === today);
        if (row) resolve(row);
        else {
          // Fallback: use first puzzle for demo
          resolve(results.data[0]);
        }
      },
      error: reject
    });
  });
}

async function loadFighters() {
  return new Promise((resolve) => {
    Papa.parse(FIGHTERS_CSV, {
      download: true,
      header: true,
      complete: (results) => {
        resolve(results.data.filter(f => f.name && f.name.trim()));
      },
      error: () => resolve([])
    });
  });
}

// ── Answer validation ────────────────────────────────────────────────────────
function validateAnswer(fighterName, rowCategory, colCategory) {
  const name = fighterName.trim().toLowerCase();
  const fighter = fighters.find(f =>
    f.name && f.name.toLowerCase() === name
  );
  if (!fighter) return { valid: false, reason: 'Fighter not found in database' };

  const rowValid = checkCategory(fighter, rowCategory);
  const colValid = checkCategory(fighter, colCategory);

  if (!rowValid) return { valid: false, reason: `Does not satisfy: ${rowCategory}` };
  if (!colValid) return { valid: false, reason: `Does not satisfy: ${colCategory}` };

  return { valid: true };
}

function checkCategory(fighter, category) {
  if (!category) return false;
  const cat = category.toLowerCase().trim();
  const fights = parseFights(fighter.fights || '');

  // ── Org categories ──
  const orgs = {
    'fought in ufc': 'ufc',
    'fought in pride fc': 'pride fc',
    'fought in bellator': 'bellator',
    'fought in one championship': 'one championship',
    'fought in strikeforce': 'strikeforce',
    'fought in wec': 'wec',
    'fought in pfl': 'pfl',
    'fought in rizin': 'rizin',
  };
  for (const [key, org] of Object.entries(orgs)) {
    if (cat === key) {
      return fights.some(f => f.org.toLowerCase() === org);
    }
  }

  // ── Nationality ──
  const nationalities = {
    'american': ['united states', 'american', 'usa'],
    'brazilian': ['brazil', 'brazilian'],
    'canadian': ['canada', 'canadian'],
    'russian': ['russia', 'russian'],
    'dagestani': ['dagestan', 'russia'],
    'japanese': ['japan', 'japanese'],
    'dutch': ['netherlands', 'dutch', 'holland'],
    'british': ['united kingdom', 'england', 'british', 'uk', 'wales', 'scotland'],
    'irish': ['ireland', 'irish'],
    'australian': ['australia', 'australian'],
    'nigerian': ['nigeria', 'nigerian'],
  };
  for (const [key, vals] of Object.entries(nationalities)) {
    if (cat === key) {
      const nat = (fighter.nationality || '').toLowerCase();
      const born = (fighter.country_of_birth || '').toLowerCase();
      return vals.some(v => nat.includes(v) || born.includes(v));
    }
  }

  // ── Weight class fights ──
  const weightClasses = [
    'heavyweight', 'light heavyweight', 'middleweight', 'welterweight',
    'lightweight', 'featherweight', 'bantamweight', 'flyweight',
    'strawweight', 'atomweight'
  ];
  for (const wc of weightClasses) {
    if (cat === `${wc} fight` || cat === wc) {
      return fights.some(f => f.weightClass.toLowerCase() === wc);
    }
  }

  // ── Finish methods ──
  if (cat === 'ko/tko win' || cat === 'ko win' || cat === 'knockout win') {
    return fights.some(f => f.result === 'win' && f.method === 'KO');
  }
  if (cat === 'submission win') {
    return fights.some(f => f.result === 'win' && f.method === 'Submission');
  }
  if (cat === 'decision win') {
    return fights.some(f => f.result === 'win' && f.method === 'Decision');
  }

  // ── Title fights ──
  if (cat === 'title fight' || cat === 'ufc title fight') {
    return fights.some(f => f.titleFight === 'yes' && (cat === 'title fight' || f.org.toLowerCase() === 'ufc'));
  }

  // ── Era ──
  if (cat === 'fought in 1990s') return fights.some(f => f.date && f.date.startsWith('199'));
  if (cat === 'fought in 2000s') return fights.some(f => f.date && f.date.startsWith('200'));
  if (cat === 'fought in 2010s') return fights.some(f => f.date && f.date.startsWith('201'));
  if (cat === 'fought in 2020s') return fights.some(f => f.date && f.date.startsWith('202'));

  // ── Fight count ──
  const countMatch = cat.match(/^(\d+)\+\s*pro fights?$/);
  if (countMatch) {
    return fights.length >= parseInt(countMatch[1]);
  }

  // ── Common opponent ──
  // Format: "[Fighter Name] opponent"
  const oppMatch = cat.match(/^(.+)\s+opponent$/);
  if (oppMatch) {
    const targetFighter = oppMatch[1].trim().toLowerCase();
    const targetData = fighters.find(f => f.name && f.name.toLowerCase() === targetFighter);
    if (!targetData) return false;
    const targetFights = parseFights(targetData.fights || '');
    const targetOpponents = targetFights.map(f => f.opponent.toLowerCase());
    return targetOpponents.includes(fighter.name.toLowerCase());
  }

  return false;
}

function parseFights(fightsStr) {
  if (!fightsStr) return [];
  return fightsStr.split('||').map(f => {
    const parts = f.split('|');
    return {
      opponent:    parts[0] || '',
      opponentId:  parts[1] || '',
      result:      parts[2] || '',
      method:      parts[3] || '',
      methodDetail:parts[4] || '',
      weightClass: parts[5] || '',
      org:         parts[6] || '',
      eventName:   parts[7] || '',
      date:        parts[8] || '',
      round:       parts[9] || '',
      time:        parts[10] || '',
      titleFight:  parts[11] || 'no',
    };
  }).filter(f => f.opponent);
}

// ── Supabase percentage tracking ─────────────────────────────────────────────
async function logAnswer(date, cellKey, fighterName) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/rpc/log_answer`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      },
      body: JSON.stringify({ p_date: date, p_cell: cellKey, p_fighter: fighterName })
    });
  } catch(e) { /* Fail silently */ }
}

async function getRarity(date, cellKey, fighterName) {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/rpc/get_rarity?p_date=${date}&p_cell=${cellKey}&p_fighter=${encodeURIComponent(fighterName)}`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const data = await res.json();
    return data || null;
  } catch(e) { return null; }
}

// ── UI helpers ───────────────────────────────────────────────────────────────
function showToast(msg, type = '', duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', duration);
}

function updateAttemptDots() {
  const container = document.getElementById('attempt-dots');
  container.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot ' + (i < attemptsUsed ? 'used' : 'remaining');
    container.appendChild(dot);
  }
  const rem = document.getElementById('attempts-remaining');
  rem.textContent = `${attemptsLeft} remaining`;
}

function selectCell(row, col) {
  if (gameOver) return;
  const cellId = `cell-${row}-${col}`;
  const cellEl = document.getElementById(cellId);
  if (!cellEl || cellEl.classList.contains('correct')) return;

  // Deselect previous
  document.querySelectorAll('.cell.selected').forEach(c => c.classList.remove('selected'));
  cellEl.classList.add('selected');
  selectedCell = { row, col };

  const rowCat = puzzle[`row${row}`];
  const colCat = puzzle[`col${col}`];
  const label = document.getElementById('input-label-text');
  if (label) label.textContent = `${rowCat} × ${colCat}`;

  document.getElementById('fighter-input').focus();
}

// ── Autocomplete ──────────────────────────────────────────────────────────────
function updateAutocomplete(query) {
  const list = document.getElementById('autocomplete-list');
  if (!query || query.length < 2) {
    list.classList.remove('visible');
    return;
  }

  const q = query.toLowerCase();
  const matches = fighterNames
    .filter(n => n.toLowerCase().includes(q))
    .slice(0, 8);

  if (!matches.length) {
    list.classList.remove('visible');
    return;
  }

  list.innerHTML = matches.map((name, i) => {
    const idx = name.toLowerCase().indexOf(q);
    const highlighted = name.slice(0, idx) + '<strong>' + name.slice(idx, idx + q.length) + '</strong>' + name.slice(idx + q.length);
    return `<div class="autocomplete-item" data-name="${name}" data-index="${i}">${highlighted}</div>`;
  }).join('');

  list.classList.add('visible');
  autocompleteIndex = -1;

  list.querySelectorAll('.autocomplete-item').forEach(item => {
    item.addEventListener('mousedown', (e) => {
      e.preventDefault();
      document.getElementById('fighter-input').value = item.dataset.name;
      list.classList.remove('visible');
      submitAnswer();
    });
  });
}

// ── Submit answer ─────────────────────────────────────────────────────────────
async function submitAnswer() {
  if (!selectedCell || gameOver) return;

  const input = document.getElementById('fighter-input');
  const name = input.value.trim();
  if (!name) {
    showToast('Enter a fighter name', 'error');
    return;
  }

  document.getElementById('autocomplete-list').classList.remove('visible');

  const { row, col } = selectedCell;
  const cellKey = `${row}-${col}`;

  if (solvedCells[cellKey]) {
    showToast('Cell already solved!');
    return;
  }

  const rowCat = puzzle[`row${row}`];
  const colCat = puzzle[`col${col}`];

  // Check if already used in another cell
  const alreadyUsed = Object.values(solvedCells).some(s => s.name.toLowerCase() === name.toLowerCase());
  if (alreadyUsed) {
    showToast('Fighter already used!', 'error');
    return;
  }

  const result = validateAnswer(name, rowCat, colCat);

  // Use an attempt regardless
  attemptsUsed++;
  attemptsLeft--;
  updateAttemptDots();

  if (result.valid) {
    // Get rarity from Supabase
    const today = getTodayKey();
    await logAnswer(today, cellKey, name);
    const rarity = await getRarity(today, cellKey, name);
    const rarityPct = rarity ? `${rarity.percentage}% picked this` : '';

    solvedCells[cellKey] = { name, rarity: rarityPct };

    const cellEl = document.getElementById(`cell-${row}-${col}`);
    cellEl.classList.remove('selected');
    cellEl.classList.add('correct');
    cellEl.innerHTML = `
      <div class="cell-inner">
        <div class="cell-fighter-name">${name}</div>
        ${rarityPct ? `<div class="cell-rarity">${rarityPct}</div>` : ''}
      </div>`;

    showToast('Correct!', 'success');
    input.value = '';
    selectedCell = null;

    // Check win
    if (Object.keys(solvedCells).length === 9) {
      setTimeout(() => endGame(true), 600);
    }
  } else {
    const cellEl = document.getElementById(`cell-${row}-${col}`);
    cellEl.classList.add('wrong-flash');
    setTimeout(() => cellEl.classList.remove('wrong-flash'), 400);
    showToast(result.reason || 'Incorrect', 'error');
  }

  saveState();

  if (attemptsLeft === 0 && !gameOver) {
    setTimeout(() => endGame(false), 600);
  }
}

// ── Game over ─────────────────────────────────────────────────────────────────
function endGame(won) {
  gameOver = true;
  saveState();

  const solved = Object.keys(solvedCells).length;
  document.getElementById('go-title').textContent = won ? 'Fights Over' : 'No Contest';
  document.getElementById('go-sub').textContent = won ? 'You solved the grid!' : 'Out of attempts';
  document.getElementById('go-score').innerHTML = `${solved}<span>/9</span>`;
  document.getElementById('game-over').classList.add('show');

  updateCountdown();
  setInterval(updateCountdown, 1000);
}

function updateCountdown() {
  const el = document.getElementById('countdown');
  if (el) el.textContent = getTimeUntilMidnight();
}

// ── Share ─────────────────────────────────────────────────────────────────────
function buildShareText() {
  const solved = Object.keys(solvedCells).length;
  let grid = '';
  for (let r = 1; r <= 3; r++) {
    for (let c = 1; c <= 3; c++) {
      grid += solvedCells[`${r}-${c}`] ? '🟩' : '⬛';
    }
    grid += '\n';
  }
  return `MMA Grid #${puzzle.puzzle_num}\n${solved}/9 solved\n\n${grid}\nmmag rid.com`;
}

// ── Build UI ──────────────────────────────────────────────────────────────────
function buildGrid() {
  const wrapper = document.getElementById('game-wrapper');
  wrapper.innerHTML = '';

  const gridEl = document.createElement('div');
  gridEl.className = 'grid-container';

  // Corner
  const corner = document.createElement('div');
  corner.className = 'corner-cell';
  gridEl.appendChild(corner);

  // Col headers
  for (let c = 1; c <= 3; c++) {
    const h = document.createElement('div');
    h.className = 'col-header';
    h.textContent = puzzle[`col${c}`] || '';
    gridEl.appendChild(h);
  }

  // Rows
  for (let r = 1; r <= 3; r++) {
    // Row header
    const rh = document.createElement('div');
    rh.className = 'row-header';
    rh.textContent = puzzle[`row${r}`] || '';
    gridEl.appendChild(rh);

    // Cells
    for (let c = 1; c <= 3; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `cell-${r}-${c}`;
      cell.dataset.row = r;
      cell.dataset.col = c;

      const cellKey = `${r}-${c}`;

      if (solvedCells[cellKey]) {
        cell.classList.add('correct');
        const s = solvedCells[cellKey];
        cell.innerHTML = `
          <div class="cell-inner">
            <div class="cell-fighter-name">${s.name}</div>
            ${s.rarity ? `<div class="cell-rarity">${s.rarity}</div>` : ''}
          </div>`;
      } else {
        cell.innerHTML = `
          <span class="cell-num">${(r-1)*3+c}</span>
          <span class="cell-plus">+</span>`;
        cell.addEventListener('click', () => selectCell(r, c));
      }

      gridEl.appendChild(cell);
    }
  }

  wrapper.appendChild(gridEl);

  // Input area
  const inputArea = document.createElement('div');
  inputArea.className = 'input-area';
  inputArea.innerHTML = `
    <div class="input-label">
      <span>Fighter</span>
      <span class="selected-cell-indicator" id="input-label-text">Select a cell</span>
    </div>
    <div class="input-row" style="position:relative;">
      <input type="text" id="fighter-input" placeholder="Type a fighter name..." autocomplete="off" />
      <button id="submit-btn">Submit</button>
      <div class="autocomplete-list" id="autocomplete-list"></div>
    </div>`;

  wrapper.appendChild(inputArea);

  // Stats bar
  const statsBar = document.createElement('div');
  statsBar.className = 'stats-bar';
  const career = JSON.parse(localStorage.getItem('mmag_career') || '{"played":0,"solved":0,"perfect":0}');
  statsBar.innerHTML = `
    <div class="stat"><div class="stat-val">${career.played}</div><div class="stat-label">Played</div></div>
    <div class="stat"><div class="stat-val">${career.solved}</div><div class="stat-label">Total Solved</div></div>
    <div class="stat"><div class="stat-val">${career.perfect}</div><div class="stat-label">Perfect</div></div>
    <div class="stat"><div class="stat-val">${Object.keys(solvedCells).length}</div><div class="stat-label">Today</div></div>`;
  wrapper.appendChild(statsBar);

  // Wire up input
  const inputEl = document.getElementById('fighter-input');
  const submitBtn = document.getElementById('submit-btn');

  inputEl.addEventListener('input', () => updateAutocomplete(inputEl.value));

  inputEl.addEventListener('keydown', (e) => {
    const list = document.getElementById('autocomplete-list');
    const items = list.querySelectorAll('.autocomplete-item');

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      autocompleteIndex = Math.min(autocompleteIndex + 1, items.length - 1);
      items.forEach((item, i) => item.classList.toggle('highlighted', i === autocompleteIndex));
      if (items[autocompleteIndex]) inputEl.value = items[autocompleteIndex].dataset.name;
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      autocompleteIndex = Math.max(autocompleteIndex - 1, -1);
      items.forEach((item, i) => item.classList.toggle('highlighted', i === autocompleteIndex));
    } else if (e.key === 'Enter') {
      if (autocompleteIndex >= 0 && items[autocompleteIndex]) {
        inputEl.value = items[autocompleteIndex].dataset.name;
        list.classList.remove('visible');
      }
      submitAnswer();
    } else if (e.key === 'Escape') {
      list.classList.remove('visible');
    }
  });

  submitBtn.addEventListener('click', submitAnswer);

  document.getElementById('share-btn').addEventListener('click', () => {
    const text = buildShareText();
    navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!', 'success'));
  });

  // If game is over from saved state, show overlay
  if (gameOver) {
    const solved = Object.keys(solvedCells).length;
    document.getElementById('go-title').textContent = solved === 9 ? 'Fights Over' : 'No Contest';
    document.getElementById('go-sub').textContent = solved === 9 ? 'You solved the grid!' : 'Out of attempts';
    document.getElementById('go-score').innerHTML = `${solved}<span>/9</span>`;
    document.getElementById('game-over').classList.add('show');
    updateCountdown();
    setInterval(updateCountdown, 1000);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  // Set date display
  const today = getTodayKey();
  document.getElementById('date-label').textContent = formatDate(today);

  // Load saved state
  loadState();
  updateAttemptDots();

  // Load puzzle + fighters in parallel
  try {
    [puzzle, fighters] = await Promise.all([loadPuzzle(), loadFighters()]);
    fighterNames = [...new Set(fighters.map(f => f.name).filter(Boolean))].sort();

    document.getElementById('puzzle-num').textContent = `#${puzzle.puzzle_num || '1'}`;
    buildGrid();
  } catch(e) {
    document.getElementById('game-wrapper').innerHTML = `
      <div class="loading">
        <div class="loading-text">Error loading puzzle</div>
      </div>`;
    console.error(e);
  }
}

init();
</script>
